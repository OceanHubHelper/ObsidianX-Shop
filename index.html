<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ObsidianX • Vault</title>
  <style>
    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
    }

    h1 {
      color: #ff4d4d;
      text-align: center;
      margin: 20px 0;
      font-size: 2.8rem;
      text-shadow: 0 0 15px #ff3300;
    }

    .store {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 15px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .card {
      background: #111;
      border: 2px solid #333;
      border-radius: 12px;
      overflow: hidden;
      transition: all 0.4s;
      position: relative;
      box-shadow: 0 4px 15px rgba(0,0,0,0.6);
    }

    .card:hover {
      transform: translateY(-8px);
      border-color: #ff4d4d;
      box-shadow: 0 12px 35px rgba(255,77,77,0.4);
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-bottom: 2px solid #222;
    }

    .card-content {
      padding: 12px;
    }

    .card h3 {
      margin: 0 0 8px;
      font-size: 1.2rem;
      color: #fff;
    }

    .card p {
      margin: 4px 0;
      font-size: 0.9rem;
      color: #bbb;
    }

    .price {
      color: #ff4d4d;
      font-weight: bold;
      font-size: 1.1rem;
    }

    .status {
      position: absolute;
      top: 10px;
      right: 10px;
      background: #ff6600;
      color: white;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: bold;
      display: none;
    }

    button {
      padding: 12px;
      font-size: 1rem;
      margin-top: 8px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
    }

    .purchase-btn { background: #ff4d4d; color: white; }
    .in-buying-btn { background: #ff6600; color: white; }

    #ownerFab {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 70px;
      height: 70px;
      background: #ff4d4d;
      color: white;
      font-size: 2.5rem;
      border: none;
      border-radius: 50%;
      box-shadow: 0 0 25px #ff3300;
      z-index: 9999;
      cursor: pointer;
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      z-index: 9998;
      align-items: center;
      justify-content: center;
      padding: 10px;
    }

    .panel {
      background: #111;
      border: 3px solid #ff4d4d;
      border-radius: 12px;
      padding: 25px;
      width: 100%;
      max-width: 420px;
      max-height: 85vh;
      overflow-y: auto;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      background: #1a1a1a;
      border: 1px solid #ff4d4d;
      color: #e0e0e0;
      border-radius: 6px;
    }
  </style>
</head>
<body>

<h1>ObsidianX Vault</h1>
<p class="refresh-text">Pull down to refresh for new drops</p>

<div class="store" id="cards"></div>

<button id="ownerFab">👑</button>

<div id="ownerPanel" class="modal">
  <div class="panel">
    <button onclick="document.getElementById('ownerPanel').style.display='none'" style="float:right;background:#ff1a1a;color:white;border:none;padding:8px 14px;border-radius:50%;">×</button>
    <h2 style="color:#ff4d4d;">Owner Vault Access</h2>
    <input id="pass" type="password" placeholder="Access Key">
    <button onclick="unlock()" style="background:#ff4d4d;color:white;margin-top:10px;">Unlock</button>
    <div id="error" style="color:#ff3366;margin:10px 0;"></div>

    <div id="mainPart" style="display:none;margin-top:20px;">
      <input id="name" placeholder="Brainrot Name" required>
      <input id="desc" placeholder="Description">
      <input id="price" placeholder="Price (e.g. 399 Robux)" required>
      <input id="robuxLink" placeholder="Robux Link">
      <input id="visaLink" placeholder="Visa Link">
      <input type="number" id="quantity" value="1" min="1">
      <select id="rarity">
        <option value="Common">Common</option>
        <option value="Uncommon">Uncommon</option>
        <option value="Rare">Rare</option>
        <option value="Mythic">Mythic</option>
        <option value="Secret">Secret</option>
        <option value="OG">OG</option>
      </select>
      <input type="file" id="photo" accept="image/*">
      <button onclick="publish()" id="publishBtn" style="background:#ff4d4d;color:white;margin-top:15px;">Forge Brainrot</button>
      <div id="statusMsg" style="color:#ff9900;margin-top:10px;"></div>
    </div>
  </div>
</div>

<script>
// Owner button
document.getElementById('ownerFab').onclick = function() {
  document.getElementById('ownerPanel').style.display = 'flex';
};

function unlock() {
  if (document.getElementById('pass').value === "favela23") {
    document.getElementById('mainPart').style.display = 'block';
  } else {
    document.getElementById('error').innerHTML = 'Wrong key';
  }
}

// Simple publish
async function publish() {
  alert('Brainrot forged! Refresh page to see it');
  document.getElementById('ownerPanel').style.display = 'none';
  loadItems();
}

// Load shop
async function loadItems() {
  try {
    const res = await fetch('/items?_=' + Date.now());
    const data = await res.json();
    document.getElementById('cards').innerHTML = data.map(i => `
      <div class="card">
        <img src="${i.img}">
        <div class="card-content">
          <h3>${i.name}</h3>
          <p>${i.desc || ''}</p>
          <p class="price">${i.price}</p>
          <button onclick="alert('Buy flow starts here')">Purchase</button>
        </div>
      </div>
    `).join('');
  } catch (err) {
    document.getElementById('cards').innerHTML = '<p style="color:red">Error loading - refresh page</p>';
  }
}

// Start
loadItems();
</script>
</body>
</html>
