<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ObsidianX Shop</title>
  <style>
    body { background:#000; color:#0f0; font-family:Arial; text-align:center; padding:20px; margin:0; }
    h1 { color:#0f0; font-size:2.5rem; margin:20px 0; }
    .store { display:grid; grid-template-columns:repeat(auto-fill, minmax(220px, 1fr)); gap:15px; max-width:1000px; margin:0 auto; }
    .card { background:#111; border:2px solid #0f0; border-radius:10px; padding:12px; }
    .card img { width:100%; height:160px; object-fit:cover; border-radius:8px; }
    button { padding:12px; font-size:1rem; margin:6px 0; border:none; border-radius:8px; cursor:pointer; width:100%; background:#0f0; color:#000; }
    #ownerFab { position:fixed; bottom:25px; right:25px; width:70px; height:70px; background:#0f0; color:#000; font-size:2.5rem; border:none; border-radius:50%; box-shadow:0 0 20px #0f0; z-index:9999; }
    .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:9998; align-items:center; justify-content:center; padding:10px; }
    .panel { background:#111; border:3px solid #0f0; border-radius:12px; padding:25px; width:100%; max-width:420px; max-height:85vh; overflow-y:auto; }
    input, select { width:100%; padding:10px; margin:8px 0; background:#222; border:1px solid #0f0; color:#0f0; border-radius:6px; }
    #statusMsg { color:#ff0; margin:10px 0; font-weight:bold; }
  </style>
</head>
<body>

<h1>ObsidianX Shop</h1>
<p style="color:#555;">Pull down to refresh if needed</p>

<div class="store" id="cards"></div>

<button id="ownerFab">👑</button>

<div id="ownerPanel" class="modal">
  <div class="panel">
    <button onclick="closeOwner()" style="float:right;background:red;color:white;border:none;padding:8px 14px;border-radius:50%;">×</button>
    <h2 style="color:#0f0;">Owner Area</h2>

    <div id="loginPart">
      <input id="pass" type="password" placeholder="Key">
      <button onclick="unlock()" style="background:#0f0;color:#000;margin-top:10px;">Open</button>
      <div id="error" style="color:red;margin:10px 0;"></div>
    </div>

    <div id="mainPart" style="display:none;margin-top:20px;">
      <input id="name" placeholder="Name" required>
      <input id="desc" placeholder="Description">
      <input id="price" placeholder="Price (e.g. 399 Robux)" required>
      <input id="robuxLink" placeholder="Robux Link">
      <input id="visaLink" placeholder="Visa Link">
      <input type="number" id="quantity" value="1" min="1">
      <select id="rarity">
        <option value="Common">Common</option>
        <option value="Uncommon">Uncommon</option>
        <option value="Rare">Rare</option>
        <option value="Mythic">Mythic</option>
        <option value="Secret">Secret</option>
        <option value="OG">OG</option>
      </select>
      <input type="file" id="photo" accept="image/*">
      <button onclick="publish()" id="publishBtn" style="background:#0f0;color:#000;margin-top:15px;">Add Brainrot</button>
      <div id="statusMsg" style="color:#ff0;margin-top:10px;"></div>
    </div>
  </div>
</div>

<script>
// Owner button
document.getElementById('ownerFab').onclick = function() {
  document.getElementById('ownerPanel').style.display = 'flex';
};

function closeOwner() {
  document.getElementById('ownerPanel').style.display = 'none';
}

function unlock() {
  const pass = document.getElementById('pass').value;
  if (pass === "favela23") {
    document.getElementById('loginPart').style.display = 'none';
    document.getElementById('mainPart').style.display = 'block';
    document.getElementById('error').innerHTML = '';
  } else {
    document.getElementById('error').innerHTML = 'Wrong key';
  }
}

// Publish
async function publish() {
  const btn = document.getElementById('publishBtn');
  const msg = document.getElementById('statusMsg');
  btn.disabled = true;
  btn.textContent = 'Adding...';
  msg.textContent = 'Saving...';

  const name = document.getElementById('name').value.trim();
  const price = document.getElementById('price').value.trim();
  if (!name || !price) {
    msg.textContent = 'Name and price required';
    btn.textContent = 'Add Brainrot';
    btn.disabled = false;
    return;
  }

  let img = "https://picsum.photos/300";
  const file = document.getElementById('photo').files[0];
  if (file) {
    img = await new Promise(r => {
      const reader = new FileReader();
      reader.onload = () => r(reader.result);
      reader.readAsDataURL(file);
    });
  }

  const body = {
    name,
    desc: document.getElementById('desc').value,
    price,
    robuxLink: document.getElementById('robuxLink').value,
    visaLink: document.getElementById('visaLink').value,
    quantity: parseInt(document.getElementById('quantity').value) || 1,
    rarity: document.getElementById('rarity').value,
    img
  };

  try {
    await fetch('/add-item', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
    msg.textContent = 'Added!';
    alert('Brainrot added! Back to shop...');
    closeOwner();
    loadItems();
  } catch (err) {
    msg.textContent = 'Failed - try again';
  } finally {
    btn.textContent = 'Add Brainrot';
    btn.disabled = false;
  }
}

// Load shop
async function loadItems() {
  try {
    const res = await fetch('/items?_=' + Date.now());
    const data = await res.json();
    document.getElementById('cards').innerHTML = data.map(i => `
      <div class="card">
        <img src="${i.img}">
        <h3>${i.name}</h3>
        <p>${i.desc || ''}</p>
        <p style="color:#0f0;font-weight:bold;">${i.price}</p>
        <button onclick="alert('Buy flow starts here')">Purchase</button>
      </div>
    `).join('');
  } catch (err) {
    document.getElementById('cards').innerHTML = '<p style="color:red">Error loading - refresh page</p>';
  }
}

// Start
loadItems();
</script>
</body>
</html>
