<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ObsidianX Brainrot Store</title>
  <style>
    body { background:#0a0a0a; color:#e0e0e0; font-family:Arial; margin:0; padding:20px; }
    h1 { color:#ff4d4d; text-align:center; margin:20px 0; font-size:2.8rem; text-shadow:0 0 15px #ff3300; }
    .store { display:grid; grid-template-columns:repeat(auto-fill, minmax(240px, 1fr)); gap:15px; max-width:1200px; margin:0 auto; }
    .card { background:#111; border:2px solid #333; border-radius:12px; overflow:hidden; position:relative; transition:0.4s; }
    .card:hover { transform:translateY(-8px); border-color:#ff4d4d; box-shadow:0 12px 35px rgba(255,77,77,0.4); }
    .card img { width:100%; height:160px; object-fit:cover; }
    .card-content { padding:12px; text-align:left; }
    .card h3 { margin:0 0 8px; font-size:1.25rem; color:#fff; font-weight:bold; }
    .card .desc { margin:4px 0 10px; font-size:0.95rem; color:#bbb; }
    .price { color:#ff4d4d; font-weight:bold; font-size:1.1rem; margin:6px 0; }
    .status { position:absolute; top:10px; right:10px; background:#ff6600; color:white; padding:4px 12px; border-radius:6px; font-size:0.8rem; font-weight:bold; display:none; }
    button { padding:14px; font-size:1.1rem; margin-top:8px; border:none; border-radius:8px; cursor:pointer; width:100%; font-weight:bold; }
    .purchase-btn { background:#ff4d4d; color:white; }
    .in-buying-btn { background:#ff6600; color:white; }
    .back-btn { background:#555; color:white; margin-top:10px; }

    #ownerFab {
      position:fixed; bottom:30px; right:30px; width:70px; height:70px;
      background:#ff4d4d; color:white; font-size:2.2rem; border:none;
      border-radius:12px; box-shadow:0 0 25px #ff3300; z-index:9999;
      display:flex; align-items:center; justify-content:center; cursor:pointer;
    }

    .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:9998; align-items:center; justify-content:center; padding:10px; }
    .panel { background:#111; border:3px solid #ff4d4d; border-radius:12px; padding:25px; width:100%; max-width:420px; max-height:85vh; overflow-y:auto; }
    input, select { width:100%; padding:10px; margin:8px 0; background:#1a1a1a; border:1px solid #ff4d4d; color:#e0e0e0; border-radius:6px; }
  </style>
</head>
<body>

<h1>ObsidianX Brainrot Store</h1>
<p style="color:#666;">Pull down to refresh for new drops</p>

<div class="store" id="cards"></div>

<button id="ownerFab">👑</button>

<!-- Owner Panel -->
<div id="ownerPanel" class="modal">
  <div class="panel">
    <button onclick="document.getElementById('ownerPanel').style.display='none'" style="float:right;background:#ff1a1a;color:white;border:none;padding:8px 14px;border-radius:50%;">×</button>
    <h2 style="color:#ff4d4d;">Owner Vault Access</h2>
    <input id="pass" type="password" placeholder="Access Key">
    <button onclick="unlock()" style="background:#ff4d4d;color:white;margin-top:10px;">Unlock</button>
    <div id="error" style="color:#ff3366;margin:10px 0;"></div>

    <div id="mainPart" style="display:none;margin-top:20px;">
      <input id="name" placeholder="Brainrot Name" required>
      <input id="desc" placeholder="Description (e.g. Lava)">
      <input id="moneyPrice" placeholder="Cost $" required>
      <input id="robuxPrice" placeholder="Robux Price (e.g. 599)" required>
      <input id="robuxLink" placeholder="Robux Link">
      <input id="visaLink" placeholder="Visa Link">
      <input type="number" id="quantity" value="1" min="1">
      <select id="rarity">
        <option value="Common">Common</option>
        <option value="Uncommon">Uncommon</option>
        <option value="Rare">Rare</option>
        <option value="Mythic">Mythic</option>
        <option value="Secret">Secret</option>
        <option value="OG">OG</option>
      </select>
      <input type="file" id="photo" accept="image/*">
      <button onclick="publish()" id="publishBtn" style="background:#ff4d4d;color:white;margin-top:15px;">Forge Brainrot</button>
      <div id="statusMsg" style="color:#ff9900;margin-top:10px;"></div>
    </div>
  </div>
</div>

<!-- Buy Steps with Back buttons -->
<div id="step1" class="modal"><div class="panel">
  <div style="font-size:1.2rem;margin-bottom:15px;">1/4</div>
  <h2 id="buyTitle"></h2>
  <button onclick="choosePay('robux')" style="background:#ff4d4d;color:white;margin:8px 0;">Robux</button>
  <button onclick="choosePay('visa')" style="background:#ff4d4d;color:white;margin:8px 0;">Visa Prepaid</button>
  <button onclick="closeModals()" class="back-btn">Back</button>
</div></div>

<div id="step2" class="modal"><div class="panel">
  <div style="font-size:1.2rem;margin-bottom:15px;">2/4</div>
  <h2>Payment Link</h2>
  <p id="payLink" style="word-break:break-all;"></p>
  <button onclick="goToStep3()" style="background:#ff4d4d;color:white;margin-top:15px;">I Purchased</button>
  <button onclick="closeModals()" class="back-btn">Back</button>
</div></div>

<div id="step3" class="modal"><div class="panel">
  <div style="font-size:1.2rem;margin-bottom:15px;">3/4</div>
  <h2>Your Roblox Username</h2>
  <input id="robloxUser" placeholder="Username">
  <button onclick="goToStep4()" style="background:#ff4d4d;color:white;margin-top:15px;">Submit</button>
  <button onclick="closeModals()" class="back-btn">Back</button>
</div></div>

<div id="step4" class="modal"><div class="panel">
  <div style="font-size:1.2rem;margin-bottom:15px;">4/4</div>
  <h2>Send Proof</h2>
  <input id="proof" placeholder="Screenshot link or description">
  <button onclick="sendToOwner()" style="background:#ff4d4d;color:white;margin-top:15px;">Send to Owner</button>
  <button onclick="closeModals()" class="back-btn">Back</button>
</div></div>

<script>
let currentId = null;
let currentName = "";

// Owner button
document.getElementById('ownerFab').onclick = () => document.getElementById('ownerPanel').style.display = 'flex';

function unlock() {
  if (document.getElementById('pass').value === "favela23") {
    document.getElementById('mainPart').style.display = 'block';
    document.getElementById('error').innerHTML = '';
  } else {
    document.getElementById('error').innerHTML = 'Wrong key';
  }
}

// Publish
async function publish() {
  const btn = document.getElementById('publishBtn');
  const msg = document.getElementById('statusMsg');
  btn.disabled = true;
  btn.textContent = 'Forging...';
  msg.textContent = 'Saving...';

  const name = document.getElementById('name').value.trim();
  const moneyPrice = document.getElementById('moneyPrice').value.trim();
  const robuxPrice = document.getElementById('robuxPrice').value.trim();

  if (!name || !moneyPrice || !robuxPrice) {
    msg.textContent = 'Name, Cost $, and Robux Price required';
    btn.textContent = 'Forge Brainrot';
    btn.disabled = false;
    return;
  }

  let img = "https://picsum.photos/300";
  const file = document.getElementById('photo').files[0];
  if (file) {
    img = await new Promise(r => {
      const reader = new FileReader();
      reader.onload = () => r(reader.result);
      reader.readAsDataURL(file);
    });
  }

  const body = {
    name, desc: document.getElementById('desc').value,
    moneyPrice, robuxPrice,
    robuxLink: document.getElementById('robuxLink').value,
    visaLink: document.getElementById('visaLink').value,
    quantity: parseInt(document.getElementById('quantity').value) || 1,
    rarity: document.getElementById('rarity').value,
    img
  };

  try {
    await fetch('/add-item', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
    msg.textContent = 'Forged!';
    alert('Brainrot added!');
    document.getElementById('ownerPanel').style.display = 'none';
    loadItems();
  } catch (e) {
    msg.textContent = 'Failed';
  } finally {
    btn.textContent = 'Forge Brainrot';
    btn.disabled = false;
  }
}

// Load cards
async function loadItems() {
  try {
    const res = await fetch('/items?_=' + Date.now());
    const data = await res.json();
    document.getElementById('cards').innerHTML = data.map(i => `
      <div class="card">
        <img src="${i.img}">
        <div class="card-content">
          <h3>${i.name}</h3>
          <p class="desc">${i.desc || ''}</p>
          <p class="price">Price: $${i.moneyPrice}</p>
          <p class="price">Robux: ${i.robuxPrice}</p>
          <button class="${i.quantity <= 0 ? 'in-buying-btn' : 'purchase-btn'}" 
                  onclick="${i.quantity <= 0 ? `alert('Sorry, this brainrot is in buying. Try purchasing another or wait a little longer.')` : `startBuy(${i.id}, '${i.name.replace(/'/g,"\\'")}', '${i.robuxLink}', '${i.visaLink}')`}">
            ${i.quantity <= 0 ? 'In Buying' : 'Purchase'}
          </button>
          <div class="status" id="hold${i.id}">IN BUYING</div>
        </div>
      </div>
    `).join('');
  } catch (e) {
    document.getElementById('cards').innerHTML = '<p style="color:red">Error loading. Refresh page.</p>';
  }
}

// Buy flow
function startBuy(id, name, robuxL, visaL) {
  currentId = id;
  currentName = name;
  document.getElementById('buyTitle').textContent = name;
  document.getElementById('step1').style.display = 'flex';
  window.currentRobuxLink = robuxL;
  window.currentVisaLink = visaL;
}

function choosePay(type) {
  closeModals();
  const link = type === 'robux' ? window.currentRobuxLink : window.currentVisaLink;
  document.getElementById('payLink').innerHTML = `Link: <a href="${link}" target="_blank" style="color:#ff4d4d;">${link || 'No link provided'}</a>`;
  document.getElementById('step2').style.display = 'flex';
}

function goToStep3() {
  if (currentId) {
    document.getElementById(`hold${currentId}`).style.display = 'block';
    fetch(`/hold/${currentId}`, {method:'POST'});
    loadItems();
  }
  closeModals();
  document.getElementById('step3').style.display = 'flex';
}

function goToStep4() {
  closeModals();
  document.getElementById('step4').style.display = 'flex';
}

async function sendToOwner() {
  const username = document.getElementById('robloxUser').value.trim() || 'Unknown';
  const proof = document.getElementById('proof').value.trim() || 'No proof';

  try {
    await fetch('/purchase-complete', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ id: currentId, name: currentName, username, proof })
    });
  } catch (e) {}

  alert(`✅ Sent to owner!\n\nBrainrot: ${currentName}\nUsername: ${username}\nProof: ${proof}`);
  closeModals();
  loadItems();
}

function closeModals() {
  document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
}

// Start
loadItems();
</script>
</body>
</html>
