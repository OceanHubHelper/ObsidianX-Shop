<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ObsidianX Shop</title>
  <style>
    body { background:#000; color:#0f0; font-family:Arial; text-align:center; padding:20px; margin:0; }
    h1 { color:#0f0; font-size:2.5rem; margin:20px 0; }
    .refresh-text { color:#555; margin:20px 0; font-size:1.1rem; }
    .store { display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:15px; max-width:1000px; margin:0 auto; }
    .card { background:#111; border:2px solid #0f0; border-radius:10px; padding:12px; position:relative; }
    .card img { width:100%; height:160px; object-fit:cover; border-radius:8px; }
    .status { position:absolute; top:8px; right:8px; background:orange; color:black; padding:4px 8px; border-radius:6px; font-size:0.8rem; display:none; }
    button { padding:12px; font-size:1rem; margin:6px 0; border:none; border-radius:8px; cursor:pointer; width:100%; }
    #ownerFab { position:fixed; bottom:25px; right:25px; width:70px; height:70px; background:#0f0; color:#000; font-size:2.5rem; border:none; border-radius:50%; box-shadow:0 0 20px #0f0; z-index:9999; }
    .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:9998; align-items:center; justify-content:center; padding:10px; }
    .panel { background:#111; border:3px solid #0f0; border-radius:12px; padding:20px; width:100%; max-width:420px; max-height:85vh; overflow-y:auto; }
    input, select { width:100%; padding:10px; margin:8px 0; background:#222; border:1px solid #0f0; color:#0f0; border-radius:6px; }
    .step { color:#555; font-size:0.9rem; margin-bottom:8px; }
  </style>
</head>
<body>

<h1>ObsidianX Shop</h1>
<p class="refresh-text">Pull down to refresh and see new brainrots</p>

<div class="store" id="cards"></div>

<button id="ownerFab">👑</button>

<!-- Owner Panel -->
<div id="ownerPanel" class="modal">
  <div class="panel">
    <button onclick="closeOwner()" style="float:right;background:red;color:white;border:none;padding:6px 12px;border-radius:50%;">×</button>
    <h2 style="color:#0f0;">Owner Area</h2>
    <div id="loginPart">
      <input id="pass" type="password" placeholder="Key">
      <button onclick="unlock()" style="background:#0f0;color:#000;">Open</button>
      <div id="error" style="color:red;margin:8px 0;"></div>
    </div>
    <div id="mainPart" style="display:none;">
      <input id="name" placeholder="Name" required>
      <input id="desc" placeholder="Description">
      <input id="price" placeholder="Price (e.g. 399 Robux)" required>
      <input id="robuxLink" placeholder="Robux Link">
      <input id="visaLink" placeholder="Visa Link">
      <input type="number" id="quantity" value="1" min="1">
      <select id="rarity">
        <option value="Common">Common</option>
        <option value="Uncommon">Uncommon</option>
        <option value="Rare">Rare</option>
        <option value="Mythic">Mythic</option>
        <option value="Secret">Secret</option>
        <option value="OG">OG</option>
      </select>
      <input type="file" id="photo" accept="image/*">
      <button onclick="publish()" id="publishBtn" style="background:#0f0;color:#000;margin-top:12px;">Add Brainrot</button>
      <div id="statusMsg" style="color:#ff0;margin-top:10px;"></div>
    </div>
  </div>
</div>

<!-- Buy Steps -->
<div id="step1" class="modal"><div class="panel">
  <div class="step">1/4</div>
  <h2 id="buyTitle"></h2>
  <button onclick="choosePay('robux')" style="background:#0f0;color:#000;">Robux</button>
  <button onclick="choosePay('visa')" style="background:#0f0;color:#000;">Visa Prepaid</button>
  <button onclick="closeModals()" style="background:#555;">Cancel</button>
</div></div>

<div id="step2" class="modal"><div class="panel">
  <div class="step">2/4</div>
  <h2>Pay Link</h2>
  <p id="payLink"></p>
  <button onclick="nextStep()" style="background:#0f0;color:#000;">I Bought It</button>
</div></div>

<div id="step3" class="modal"><div class="panel">
  <div class="step">3/4</div>
  <h2>Your Roblox Username</h2>
  <input id="robloxUser" placeholder="Username">
  <button onclick="nextStep()" style="background:#0f0;color:#000;">Submit</button>
</div></div>

<div id="step4" class="modal"><div class="panel">
  <div class="step">4/4</div>
  <h2>Proof</h2>
  <input id="proof" placeholder="Screenshot link">
  <button onclick="sendToOwner()" style="background:#0f0;color:#000;">Send to Owner</button>
</div></div>

<script>
// Green particles
const canvas = document.createElement('canvas');
canvas.style.position = 'fixed';
canvas.style.inset = '0';
canvas.style.zIndex = '-1';
document.body.appendChild(canvas);
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
let particles = [];
class Particle { constructor() { this.x = Math.random()*canvas.width; this.y = Math.random()*canvas.height; this.size = Math.random()*3+1; } update() { this.x += (Math.random()-0.5)*1; this.y += (Math.random()-0.5)*1; } draw() { ctx.fillStyle = '#0f0'; ctx.fillRect(this.x,this.y,this.size,this.size); } }
for(let i=0;i<80;i++) particles.push(new Particle());
function loop() { ctx.clearRect(0,0,canvas.width,canvas.height); particles.forEach(p=>{p.update();p.draw();}); requestAnimationFrame(loop); }
loop();

// Owner panel
document.getElementById('ownerFab').onclick = () => document.getElementById('ownerPanel').style.display = 'flex';
function closeOwner() { document.getElementById('ownerPanel').style.display = 'none'; }
function unlock() {
  if (document.getElementById('pass').value === "favela23") {
    document.getElementById('loginPart').style.display = 'none';
    document.getElementById('mainPart').style.display = 'block';
  } else {
    document.getElementById('error').innerHTML = 'Wrong key';
  }
}

// Publish
async function publish() {
  const btn = document.getElementById('publishBtn');
  const status = document.getElementById('statusMsg');
  btn.disabled = true;
  btn.textContent = 'Adding...';
  status.textContent = 'Saving...';

  const name = document.getElementById('name').value.trim();
  const price = document.getElementById('price').value.trim();
  if (!name || !price) {
    status.textContent = 'Name and price needed';
    btn.textContent = 'Add Brainrot';
    btn.disabled = false;
    return;
  }

  let img = "https://picsum.photos/300";
  const file = document.getElementById('photo').files[0];
  if (file) {
    status.textContent = 'Adding photo...';
    img = await new Promise(r => {
      const reader = new FileReader();
      reader.onload = () => r(reader.result);
      reader.readAsDataURL(file);
    });
  }

  status.textContent = 'Finishing...';
  const body = {
    name,
    desc: document.getElementById('desc').value,
    price,
    robuxLink: document.getElementById('robuxLink').value,
    visaLink: document.getElementById('visaLink').value,
    quantity: parseInt(document.getElementById('quantity').value) || 1,
    rarity: document.getElementById('rarity').value,
    img
  };

  try {
    const res = await fetch('/add-item', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body)
    });
    if (res.ok) {
      status.textContent = 'Done!';
      alert('Added! Going back to shop...');
      closeOwner();
      await loadItems();
    } else {
      status.textContent = 'Server error';
    }
  } catch (err) {
    status.textContent = 'Error - try again';
    console.log(err);
  } finally {
    btn.textContent = 'Add Brainrot';
    btn.disabled = false;
  }
}

// Load shop
async function loadItems() {
  try {
    const res = await fetch('/items?_=' + Date.now());
    const data = await res.json();
    document.getElementById('cards').innerHTML = data.map(i => `
      <div class="card">
        <img src="${i.img}">
        <h3>${i.name} (${i.quantity} left • ${i.rarity})</h3>
        <p>${i.desc || ''} • ${i.price}</p>
        <button onclick="startBuy(${i.id}, '${i.name}', '${i.robuxLink}', '${i.visaLink}')">BUY NOW</button>
        <div class="status" id="hold${i.id}">IN ORDER</div>
      </div>
    `).join('');
  } catch (err) {
    console.log('Load error', err);
  }
}

// Buy flow
function startBuy(id, name, robuxL, visaL) {
  currentId = id;
  document.getElementById(`hold${id}`).style.display = 'block';
  document.getElementById('buyTitle').textContent = name;
  document.getElementById('step1').style.display = 'flex';
  window.robuxL = robuxL;
  window.visaL = visaL;
  fetch(`/hold/${id}`, {method:'POST'});
}

function choosePay(type) {
  closeModals();
  document.getElementById('payLink').innerHTML = `Link: <a href="${type==='robux'?window.robuxL:window.visaL}" target="_blank">${type==='robux'?window.robuxL:window.visaL}</a>`;
  document.getElementById('step2').style.display = 'flex';
}

function nextStep() {
  closeModals();
  if (document.getElementById('step2').style.display === 'flex') {
    document.getElementById('step3').style.display = 'flex';
  } else if (document.getElementById('step3').style.display === 'flex') {
    document.getElementById('step4').style.display = 'flex';
  }
}

function sendToOwner() {
  const username = document.getElementById('robloxUser')?.value || 'Unknown';
  const proof = document.getElementById('proof')?.value || 'No proof';
  alert(`Sent to owner!\nItem: ${document.getElementById('buyTitle').textContent}\nUsername: ${username}\nProof: ${proof}`);
  closeModals();
  loadItems();
}

function closeModals() {
  document.getElementById('step1').style.display = 'none';
  document.getElementById('step2').style.display = 'none';
  document.getElementById('step3').style.display = 'none';
  document.getElementById('step4').style.display = 'none';
}

// Start
loadItems();
</script>
</body>
</html>
