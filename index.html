<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ObsidianX Shop</title>
  <style>
    body { background:#000; color:#0f0; font-family:Arial; text-align:center; padding:20px; margin:0; }
    h1 { color:#0f0; font-size:2.5rem; margin:20px 0; }
    .store { display:grid; grid-template-columns:repeat(auto-fill, minmax(210px, 1fr)); gap:12px; max-width:1000px; margin:0 auto; }
    .card { background:#111; border:2px solid #0f0; border-radius:10px; overflow:hidden; padding:10px; }
    .card img { width:100%; height:160px; object-fit:cover; border-radius:8px; }
    button { padding:12px; font-size:1rem; margin:8px 0; border:none; border-radius:8px; cursor:pointer; width:100%; background:#0f0; color:#000; }
    #ownerFab { position:fixed; bottom:25px; right:25px; width:70px; height:70px; background:#0f0; color:#000; font-size:2.5rem; border:none; border-radius:50%; box-shadow:0 0 20px #0f0; z-index:9999; }
    .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:9998; align-items:center; justify-content:center; padding:10px; }
    .panel { background:#111; border:3px solid #0f0; border-radius:12px; padding:25px; width:100%; max-width:420px; max-height:85vh; overflow-y:auto; }
    input, select { width:100%; padding:10px; margin:8px 0; background:#222; border:1px solid #0f0; color:#0f0; border-radius:6px; }
  </style>
</head>
<body>

<h1>ObsidianX Shop</h1>
<p style="color:#555;">Pull down to refresh</p>

<div class="store" id="cards"></div>

<button id="ownerFab">👑</button>

<!-- Owner Panel -->
<div id="ownerPanel" class="modal">
  <div class="panel">
    <button onclick="closeOwner()" style="float:right;background:red;color:white;border:none;padding:6px 12px;border-radius:50%;">×</button>
    <h2 style="color:#0f0;">Owner Area</h2>
    <input id="pass" type="password" placeholder="Key">
    <button onclick="unlock()" style="background:#0f0;color:#000;margin-top:10px;">Open</button>
    <div id="error" style="color:red;margin:10px 0;"></div>

    <div id="mainPart" style="display:none;margin-top:20px;">
      <input id="name" placeholder="Name" required>
      <input id="price" placeholder="Price (e.g. 399 Robux)" required>
      <input type="file" id="photo" accept="image/*">
      <button onclick="publish()" style="background:#0f0;color:#000;margin-top:15px;">Add Brainrot</button>
    </div>
  </div>
</div>

<script>
// Owner button
document.getElementById('ownerFab').onclick = function() {
  document.getElementById('ownerPanel').style.display = 'flex';
};

function closeOwner() {
  document.getElementById('ownerPanel').style.display = 'none';
}

function unlock() {
  if (document.getElementById('pass').value === "favela23") {
    document.getElementById('error').innerHTML = '';
    document.getElementById('mainPart').style.display = 'block';
  } else {
    document.getElementById('error').innerHTML = 'Wrong key';
  }
}

// Simple publish
async function publish() {
  alert('Added! (Refresh page to see it)');
  closeOwner();
  loadItems();
}

// Load brainrots
async function loadItems() {
  const res = await fetch('/items');
  const data = await res.json();
  document.getElementById('cards').innerHTML = data.map(i => `
    <div class="card">
      <img src="${i.img}">
      <h3>${i.name}</h3>
      <p>${i.price}</p>
      <button onclick="alert('Buy flow starts here')">Purchase</button>
    </div>
  `).join('');
}

// Start
loadItems();
</script>
</body>
</html>
