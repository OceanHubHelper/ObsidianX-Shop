<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ObsidianX • Vault</title>
  <style>
    body { background:#000; color:#0f0; font-family:Arial; text-align:center; padding:20px; margin:0; }
    h1 { color:#0f0; font-size:2.8rem; margin:20px 0; }
    .refresh-text { color:#555; margin:20px 0; font-size:1.1rem; }
    .store { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:20px; max-width:1200px; margin:0 auto; }
    .card { background:#111; border:2px solid #0f0; border-radius:12px; padding:15px; position:relative; }
    .card img { width:100%; height:180px; object-fit:cover; border-radius:8px; }
    .status { position:absolute; top:10px; right:10px; background:orange; color:black; padding:4px 10px; border-radius:6px; font-size:0.9rem; display:none; }
    button { padding:14px; font-size:1.1rem; margin:8px 0; border:none; border-radius:8px; cursor:pointer; width:100%; }
    #ownerFab { position:fixed; bottom:30px; right:30px; width:80px; height:80px; background:#0f0; color:#000; font-size:2.8rem; border:none; border-radius:50%; box-shadow:0 0 25px #0f0; z-index:9999; }
    .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:9998; align-items:center; justify-content:center; padding:10px; }
    .panel { background:#111; border:3px solid #0f0; border-radius:16px; padding:25px; width:100%; max-width:480px; max-height:85vh; overflow-y:auto; }
    input, select { width:100%; padding:12px; margin:10px 0; background:#222; border:1px solid #0f0; color:#0f0; border-radius:8px; }
    .step { color:#555; font-size:0.9rem; margin-bottom:10px; }
  </style>
</head>
<body>

<h1>ObsidianX Vault</h1>
<p class="refresh-text">Refresh this page to see if there any new brainrot in stock</p>

<div class="store" id="cards"></div>

<button id="ownerFab">👑</button>

<!-- Owner Panel (scrollable) -->
<div id="ownerPanel" class="modal">
  <div class="panel">
    <button onclick="closeOwner()" style="float:right;background:red;color:white;border:none;padding:8px 16px;border-radius:50%;">×</button>
    <h2 style="color:#0f0;">OWNER PANEL</h2>
    <div id="loginPart">
      <input id="pass" type="password" placeholder="Access key">
      <button onclick="unlock()" style="background:#0f0;color:#000;">UNLOCK</button>
      <div id="error" style="color:red;margin:10px 0;"></div>
    </div>
    <div id="mainPart" style="display:none;">
      <input id="name" placeholder="Name" required>
      <input id="desc" placeholder="Description">
      <input id="price" placeholder="Price (e.g. 399 Robux)" required>
      <input id="robuxLink" placeholder="Robux Gamepass Link">
      <input id="visaLink" placeholder="Visa Prepaid Gift Card Link">
      <input type="number" id="quantity" value="1" min="1">
      <select id="rarity">
        <option value="Common" style="color:#aaa">Common</option>
        <option value="Uncommon" style="color:#0f0">Uncommon</option>
        <option value="Rare" style="color:#00bfff">Rare</option>
        <option value="Mythic" style="color:#c300ff">Mythic</option>
        <option value="Secret" style="color:#ff1a1a">Secret</option>
        <option value="OG" style="color:#ffd700">OG</option>
      </select>
      <input type="file" id="photo" accept="image/*">
      <button onclick="publish()" id="publishBtn" style="background:#0f0;color:#000;margin-top:15px;">PUBLISH DROP</button>
    </div>
  </div>
</div>

<!-- Buy Steps (1/4 to 4/4) -->
<div id="step1" class="modal"><div class="panel">
  <div class="step">1/4</div>
  <h2 id="buyTitle"></h2>
  <button onclick="choosePay('robux')" style="background:#0f0;color:#000;">💎 Robux</button>
  <button onclick="choosePay('visa')" style="background:#0f0;color:#000;">💳 Visa Prepaid</button>
  <button onclick="closeModals()" style="background:#555;">Cancel</button>
</div></div>

<div id="step2" class="modal"><div class="panel">
  <div class="step">2/4</div>
  <h2>Pay Here</h2>
  <p id="payLink"></p>
  <button onclick="nextStep()" style="background:#0f0;color:#000;">I PURCHASED</button>
</div></div>

<div id="step3" class="modal"><div class="panel">
  <div class="step">3/4</div>
  <h2>Your Roblox Username</h2>
  <input id="robloxUser" placeholder="Username">
  <button onclick="nextStep()" style="background:#0f0;color:#000;">SUBMIT</button>
</div></div>

<div id="step4" class="modal"><div class="panel">
  <div class="step">4/4</div>
  <h2>Proof</h2>
  <input id="proof" placeholder="Screenshot link or card details">
  <button onclick="sendToOwner()" style="background:#0f0;color:#000;">SEND TO OWNER</button>
</div></div>

<script>
let currentId = null, currentType = '';

// Owner
document.getElementById('ownerFab').onclick = () => document.getElementById('ownerPanel').style.display = 'flex';
function closeOwner() { document.getElementById('ownerPanel').style.display = 'none'; }
function unlock() {
  if (document.getElementById('pass').value === "favela23") {
    document.getElementById('loginPart').style.display = 'none';
    document.getElementById('mainPart').style.display = 'block';
  } else document.getElementById('error').innerHTML = 'Wrong password';
}

// Publish with validation
async function publish() {
  const name = document.getElementById('name').value.trim();
  const price = document.getElementById('price').value.trim();
  if (!name || !price) return alert("Name and Price are required!");

  const btn = document.getElementById('publishBtn');
  btn.textContent = 'Publishing...';
  btn.disabled = true;

  const file = document.getElementById('photo').files[0];
  let img = "https://picsum.photos/300";
  if (file) {
    const reader = new FileReader();
    reader.onload = () => sendPublish(reader.result);
    reader.readAsDataURL(file);
  } else sendPublish(img);
}

async function sendPublish(img) {
  const body = {
    name: document.getElementById('name').value,
    desc: document.getElementById('desc').value,
    price: document.getElementById('price').value,
    robuxLink: document.getElementById('robuxLink').value,
    visaLink: document.getElementById('visaLink').value,
    quantity: parseInt(document.getElementById('quantity').value) || 1,
    rarity: document.getElementById('rarity').value,
    img
  };
  await fetch('/add-item', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
  alert('✅ Published! Returning to shop...');
  closeOwner();
  loadItems();
}

// Load shop
async function loadItems() {
  const res = await fetch('/items');
  const data = await res.json();
  document.getElementById('cards').innerHTML = data.map(i => `
    <div class="card">
      <img src="${i.img}">
      <h3>${i.name} <small>(${i.quantity} left • ${i.rarity})</small></h3>
      <p>${i.desc || ''} • ${i.price}</p>
      <button onclick="startBuy(${i.id}, '${i.name}', '${i.robuxLink}', '${i.visaLink}')">BUY NOW</button>
      <div class="status" id="hold${i.id}">IN ORDER</div>
    </div>
  `).join('');
}

function startBuy(id, name, robuxL, visaL) {
  currentId = id;
  document.getElementById(`hold${id}`).style.display = 'block';
  document.getElementById('buyTitle').textContent = name;
  document.getElementById('step1').style.display = 'flex';
  window.robuxL = robuxL;
  window.visaL = visaL;
  fetch(`/hold/${id}`, {method:'POST'});
}

function choosePay(type) {
  closeModals();
  currentType = type;
  document.getElementById('payLink').innerHTML = `Link: <a href="${type==='robux' ? window.robuxL : window.visaL}" target="_blank">${type==='robux' ? window.robuxL : window.visaL}</a>`;
  document.getElementById('step2').style.display = 'flex';
}

function nextStep() {
  closeModals();
  if (document.getElementById('step2').style.display === 'flex') {
    document.getElementById('step3').style.display = 'flex';
  } else if (document.getElementById('step3').style.display === 'flex') {
    document.getElementById('step4').style.display = 'flex';
  }
}

function sendToOwner() {
  const username = document.getElementById('robloxUser') ? document.getElementById('robloxUser').value : "Unknown";
  const proof = document.getElementById('proof').value || "No proof";
  alert(`📨 Sent to owner!\nBrainrot: ${document.getElementById('buyTitle').textContent}\nRoblox: ${username}\nProof: ${proof}\n\n(Discord bot will ping you with screenshot + username)`);
  closeModals();
  loadItems();
}

function closeModals() {
  document.getElementById('step1').style.display = 'none';
  document.getElementById('step2').style.display = 'none';
  document.getElementById('step3').style.display = 'none';
  document.getElementById('step4').style.display = 'none';
}

// Start
loadItems();
</script>
</body>
</html>
